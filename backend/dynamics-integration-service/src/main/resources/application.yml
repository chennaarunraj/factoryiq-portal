server:
  port: 8088

spring:
  application:
    name: dynamics-sync-service

  datasource:
    url: jdbc:postgresql://localhost:5432/portaldb
    username: portaluser
    password: portalpass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: portal

  flyway:
    enabled: false

# ─────────────────────────────────────────
# Dynamics 365 Configuration
# ─────────────────────────────────────────
dynamics:
  mock-mode: true
  tenant-id: your-tenant-id
  client-id: your-client-id
  client-secret: your-client-secret
  resource-url: https://yourorg.crm.dynamics.com
  api-version: v9.2

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.portal.dynamics: DEBUG