server:
  port: 8888

spring:
  application:
    name: api-gateway

  # ─────────────────────────────────────────
  # Cloud Gateway Routes
  # ─────────────────────────────────────────
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

      routes:
        - id: program-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/programs/**

        - id: production-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/production/**

        - id: quality-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/quality/**

        - id: supply-chain-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/supply-chain/**

        - id: after-sales-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/after-sales/**

        - id: document-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/documents/**

  # ─────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379

  # ─────────────────────────────────────────
  # Security
  # ─────────────────────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/manufacturing-portal

# ─────────────────────────────────────────
# Actuator
# ─────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.portal.gateway: DEBUG