server:
  port: 8082

spring:
  application:
    name: production-service

  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/portaldb
    username: portaluser
    password: portalpass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # ─────────────────────────────────────────
  # JPA
  # ─────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: portal
        format_sql: true

  # ─────────────────────────────────────────
  # Flyway - disabled (we run SQL manually)
  # ─────────────────────────────────────────
  flyway:
    enabled: false

  # ─────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379

  # ─────────────────────────────────────────
  # Kafka
  # ─────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: production-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

  # ─────────────────────────────────────────
  # Security - Keycloak
  # ─────────────────────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/manufacturing-portal

# ─────────────────────────────────────────
# Actuator
# ─────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ─────────────────────────────────────────
# SpringDoc - Swagger UI
# ─────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# ─────────────────────────────────────────
# Logging
# ─────────────────────────────────────────
logging:
  level:
    com.portal.production: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG